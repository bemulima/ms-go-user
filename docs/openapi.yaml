openapi: 3.1.0
info:
  title: user-service API
  version: 1.0.0
servers:
  - url: ${APP_PUBLIC_URL}
paths:
  /auth/signup:
    post:
      summary: Start signup (2-step)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 8}
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  uuid: {type: string, format: uuid}
  /auth/code-verification:
    post:
      summary: Verify signup code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uuid, code]
              properties:
                uuid: {type: string, format: uuid}
                code: {type: string}
      responses:
        "200": {description: OK}
  /auth/signin:
    post:
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string}
      responses:
        "200": {description: JWT tokens}
  /users/me:
    get:
      security: [{bearerAuth: []}]
      summary: Get current user profile with masked email
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileView"
    patch:
      security: [{bearerAuth: []}]
      summary: Update current user profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: {type: string}
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /users/{id}:
    get:
      security: [{bearerAuth: []}]
      summary: Get user profile by id with masked email
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUserProfileView"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfile:
      type: object
      required: [id, user_id, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        display_name: {type: string, nullable: true}
        avatar_file_id: {type: string, format: uuid, nullable: true}
        avatar_url: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    UserProfileView:
      type: object
      required: [id, email, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        email:
          type: string
          description: Masked email value
          example: u****@***e.com
        status: {type: string}
        is_active: {type: boolean}
        display_name: {type: string, nullable: true}
        avatar_file_id: {type: string, format: uuid, nullable: true}
        avatar_url: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    PublicUserProfileView:
      type: object
      required: [id, email, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        email:
          type: string
          description: Masked email value
          example: u****@***e.com
        display_name: {type: string, nullable: true}
        avatar_file_id: {type: string, format: uuid, nullable: true}
        avatar_url: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
